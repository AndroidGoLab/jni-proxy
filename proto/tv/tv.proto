service TableRequestService {
  rpc NewTableRequest (NewTableRequestRequest) returns (NewTableRequestResponse);
  rpc DescribeContents (DescribeContentsRequest) returns (DescribeContentsResponse);
  rpc GetTableId (GetTableIdRequest) returns (GetTableIdResponse);
  rpc GetTableName (GetTableNameRequest) returns (GetTableNameResponse);
  rpc GetVersion (GetVersionRequest) returns (GetVersionResponse);
  rpc WriteToParcel (WriteToParcelRequest) returns (WriteToParcelResponse);
}

service TsRequestService {
  rpc NewTsRequest (NewTsRequestRequest) returns (NewTsRequestResponse);
  rpc DescribeContents (DescribeContentsRequest) returns (DescribeContentsResponse);
  rpc GetTsPid (GetTsPidRequest) returns (GetTsPidResponse);
  rpc WriteToParcel (WriteToParcelRequest) returns (WriteToParcelResponse);
}

service ContentRatingService {
  rpc Contains (ContainsRequest) returns (ContainsResponse);
  rpc Equals (EqualsRequest) returns (EqualsResponse);
  rpc FlattenToString (FlattenToStringRequest) returns (FlattenToStringResponse);
  rpc GetDomain (GetDomainRequest) returns (GetDomainResponse);
  rpc GetMainRating (GetMainRatingRequest) returns (GetMainRatingResponse);
  rpc GetRatingSystem (GetRatingSystemRequest) returns (GetRatingSystemResponse);
  rpc GetSubRatings (GetSubRatingsRequest) returns (GetSubRatingsResponse);
  rpc HashCode (HashCodeRequest) returns (HashCodeResponse);
  rpc CreateRating (CreateRatingRequest) returns (CreateRatingResponse);
  rpc UnflattenFromString (UnflattenFromStringRequest) returns (UnflattenFromStringResponse);
}

service BroadcastInfoResponseService {
  rpc DescribeContents (BroadcastInfoResponseDescribeContentsRequest) returns (DescribeContentsResponse);
  rpc GetRequestId (GetRequestIdRequest) returns (GetRequestIdResponse);
  rpc GetResponseResult (GetResponseResultRequest) returns (GetResponseResultResponse);
  rpc GetSequence (GetSequenceRequest) returns (GetSequenceResponse);
  rpc GetType (GetTypeRequest) returns (GetTypeResponse);
  rpc WriteToParcel (BroadcastInfoResponseWriteToParcelRequest) returns (WriteToParcelResponse);
}

service BroadcastInfoRequestService {
  rpc DescribeContents (BroadcastInfoRequestDescribeContentsRequest) returns (DescribeContentsResponse);
  rpc GetOption (GetOptionRequest) returns (GetOptionResponse);

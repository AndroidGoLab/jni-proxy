service AnalogClockService {
  rpc NewAnalogClock (NewAnalogClockRequest) returns (NewAnalogClockResponse);
  rpc GetDialTintBlendMode (GetDialTintBlendModeRequest) returns (GetDialTintBlendModeResponse);
  rpc GetDialTintList (GetDialTintListRequest) returns (GetDialTintListResponse);
  rpc GetHourHandTintBlendMode (GetHourHandTintBlendModeRequest) returns (GetHourHandTintBlendModeResponse);
  rpc GetHourHandTintList (GetHourHandTintListRequest) returns (GetHourHandTintListResponse);
  rpc GetMinuteHandTintBlendMode (GetMinuteHandTintBlendModeRequest) returns (GetMinuteHandTintBlendModeResponse);
  rpc GetMinuteHandTintList (GetMinuteHandTintListRequest) returns (GetMinuteHandTintListResponse);
  rpc GetSecondHandTintBlendMode (GetSecondHandTintBlendModeRequest) returns (GetSecondHandTintBlendModeResponse);
  rpc GetSecondHandTintList (GetSecondHandTintListRequest) returns (GetSecondHandTintListResponse);
  rpc GetTimeZone (GetTimeZoneRequest) returns (GetTimeZoneResponse);
  rpc OnVisibilityAggregated (OnVisibilityAggregatedRequest) returns (OnVisibilityAggregatedResponse);
  rpc SetDial (SetDialRequest) returns (SetDialResponse);
  rpc SetDialTintBlendMode (SetDialTintBlendModeRequest) returns (SetDialTintBlendModeResponse);
  rpc SetDialTintList (SetDialTintListRequest) returns (SetDialTintListResponse);
  rpc SetHourHand (SetHourHandRequest) returns (SetHourHandResponse);
  rpc SetHourHandTintBlendMode (SetHourHandTintBlendModeRequest) returns (SetHourHandTintBlendModeResponse);
  rpc SetHourHandTintList (SetHourHandTintListRequest) returns (SetHourHandTintListResponse);
  rpc SetMinuteHand (SetMinuteHandRequest) returns (SetMinuteHandResponse);
  rpc SetMinuteHandTintBlendMode (SetMinuteHandTintBlendModeRequest) returns (SetMinuteHandTintBlendModeResponse);
  rpc SetMinuteHandTintList (SetMinuteHandTintListRequest) returns (SetMinuteHandTintListResponse);
  rpc SetSecondHand (SetSecondHandRequest) returns (SetSecondHandResponse);
  rpc SetSecondHandTintBlendMode (SetSecondHandTintBlendModeRequest) returns (SetSecondHandTintBlendModeResponse);
  rpc SetSecondHandTintList (SetSecondHandTintListRequest) returns (SetSecondHandTintListResponse);
  rpc SetTimeZone (SetTimeZoneRequest) returns (SetTimeZoneResponse);
}

service SpinnerService {
  rpc NewSpinner (NewSpinnerRequest) returns (NewSpinnerResponse);
  rpc GetAccessibilityClassName (GetAccessibilityClassNameRequest) returns (GetAccessibilityClassNameResponse);
  rpc GetBaseline (GetBaselineRequest) returns (GetBaselineResponse);
  rpc GetDropDownHorizontalOffset (GetDropDownHorizontalOffsetRequest) returns (GetDropDownHorizontalOffsetResponse);
  rpc GetDropDownVerticalOffset (GetDropDownVerticalOffsetRequest) returns (GetDropDownVerticalOffsetResponse);
  rpc GetDropDownWidth (GetDropDownWidthRequest) returns (GetDropDownWidthResponse);
  rpc GetGravity (GetGravityRequest) returns (GetGravityResponse);
  rpc GetPopupBackground (GetPopupBackgroundRequest) returns (GetPopupBackgroundResponse);
  rpc GetPopupContext (GetPopupContextRequest) returns (GetPopupContextResponse);
  rpc GetPrompt (GetPromptRequest) returns (GetPromptResponse);
  rpc OnClick (OnClickRequest) returns (OnClickResponse);
  rpc OnResolvePointerIcon (OnResolvePointerIconRequest) returns (OnResolvePointerIconResponse);
  rpc OnRestoreInstanceState (OnRestoreInstanceStateRequest) returns (OnRestoreInstanceStateResponse);
  rpc OnSaveInstanceState (OnSaveInstanceStateRequest) returns (OnSaveInstanceStateResponse);
  rpc OnTouchEvent (OnTouchEventRequest) returns (OnTouchEventResponse);
  rpc PerformClick (PerformClickRequest) returns (PerformClickResponse);

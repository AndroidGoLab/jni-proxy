  rpc GetAudioAttributes (GetAudioAttributesRequest) returns (GetAudioAttributesResponse);
  rpc GetCurrentVolume (GetCurrentVolumeRequest) returns (GetCurrentVolumeResponse);
  rpc GetMaxVolume (GetMaxVolumeRequest) returns (GetMaxVolumeResponse);
  rpc GetPlaybackType (GetPlaybackTypeRequest) returns (GetPlaybackTypeResponse);
  rpc GetVolumeControl (GetVolumeControlRequest) returns (GetVolumeControlResponse);
  rpc GetVolumeControlId (GetVolumeControlIdRequest) returns (GetVolumeControlIdResponse);
  rpc ToString (ToStringRequest) returns (ToStringResponse);
  rpc WriteToParcel (WriteToParcelRequest) returns (WriteToParcelResponse);
}

service MediaControllerTransportControlsService {
  rpc FastForward (FastForwardRequest) returns (FastForwardResponse);
  rpc Pause (PauseRequest) returns (PauseResponse);
  rpc Play (PlayRequest) returns (PlayResponse);
  rpc PlayFromMediaId (PlayFromMediaIdRequest) returns (PlayFromMediaIdResponse);
  rpc PlayFromSearch (PlayFromSearchRequest) returns (PlayFromSearchResponse);
  rpc PlayFromUri (PlayFromUriRequest) returns (PlayFromUriResponse);
  rpc Prepare (PrepareRequest) returns (PrepareResponse);
  rpc PrepareFromMediaId (PrepareFromMediaIdRequest) returns (PrepareFromMediaIdResponse);
  rpc PrepareFromSearch (PrepareFromSearchRequest) returns (PrepareFromSearchResponse);
  rpc PrepareFromUri (PrepareFromUriRequest) returns (PrepareFromUriResponse);
  rpc Rewind (RewindRequest) returns (RewindResponse);
  rpc SeekTo (SeekToRequest) returns (SeekToResponse);
  rpc SendCustomAction2 (SendCustomAction2Request) returns (SendCustomAction2Response);
  rpc SendCustomAction2_1 (SendCustomAction2_1Request) returns (SendCustomAction2_1Response);
  rpc SetPlaybackSpeed (SetPlaybackSpeedRequest) returns (SetPlaybackSpeedResponse);
  rpc SetRating (SetRatingRequest) returns (SetRatingResponse);
  rpc SkipToNext (SkipToNextRequest) returns (SkipToNextResponse);
  rpc SkipToPrevious (SkipToPreviousRequest) returns (SkipToPreviousResponse);
  rpc SkipToQueueItem (SkipToQueueItemRequest) returns (SkipToQueueItemResponse);
  rpc Stop (StopRequest) returns (StopResponse);
}

  rpc GetShadowColor (GetShadowColorRequest) returns (GetShadowColorResponse);
  rpc GetShadowDx (GetShadowDxRequest) returns (GetShadowDxResponse);
  rpc GetShadowDy (GetShadowDyRequest) returns (GetShadowDyResponse);
  rpc GetShadowRadius (GetShadowRadiusRequest) returns (GetShadowRadiusResponse);
  rpc GetSpanTypeId (GetSpanTypeIdRequest) returns (GetSpanTypeIdResponse);
  rpc GetTextColor (GetTextColorRequest) returns (GetTextColorResponse);
  rpc GetTextFontWeight (GetTextFontWeightRequest) returns (GetTextFontWeightResponse);
  rpc GetTextLocales (GetTextLocalesRequest) returns (GetTextLocalesResponse);
  rpc GetTextSize (GetTextSizeRequest) returns (GetTextSizeResponse);
  rpc GetTextStyle (GetTextStyleRequest) returns (GetTextStyleResponse);
  rpc GetTypeface (GetTypefaceRequest) returns (GetTypefaceResponse);
  rpc IsElegantTextHeight (IsElegantTextHeightRequest) returns (IsElegantTextHeightResponse);
  rpc ToString (ToStringRequest) returns (ToStringResponse);
  rpc UpdateDrawState (UpdateDrawStateRequest) returns (UpdateDrawStateResponse);
  rpc UpdateMeasureState (UpdateMeasureStateRequest) returns (UpdateMeasureStateResponse);
  rpc WriteToParcel (WriteToParcelRequest) returns (WriteToParcelResponse);
}


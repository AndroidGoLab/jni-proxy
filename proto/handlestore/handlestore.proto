syntax = "proto3";

package handlestore;

option go_package = "github.com/AndroidGoLab/jni-proxy/proto/handlestore";

service HandleStoreService {
  rpc ReleaseHandle(ReleaseHandleRequest) returns (ReleaseHandleResponse);
}

message ReleaseHandleRequest {
  int64 handle = 1;
}

message ReleaseHandleResponse {}

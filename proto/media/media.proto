  rpc OnConnect (OnConnectRequest) returns (OnConnectResponse);
  rpc OnDisconnected (Session2SessionCallbackOnDisconnectedRequest) returns (OnDisconnectedResponse);
  rpc OnPostConnect (OnPostConnectRequest) returns (OnPostConnectResponse);
  rpc OnSessionCommand (Session2SessionCallbackOnSessionCommandRequest) returns (OnSessionCommandResponse);
}

service CameraPrewarmServiceService {
  rpc OnBind (OnBindRequest) returns (OnBindResponse);
  rpc OnCooldown (OnCooldownRequest) returns (OnCooldownResponse);
  rpc OnPrewarm (OnPrewarmRequest) returns (OnPrewarmResponse);
  rpc OnUnbind (OnUnbindRequest) returns (OnUnbindResponse);
}

service BrowserServiceService {
  rpc Dump (DumpRequest) returns (DumpResponse);
  rpc GetBrowserRootHints (GetBrowserRootHintsRequest) returns (GetBrowserRootHintsResponse);
  rpc GetCurrentBrowserInfo (GetCurrentBrowserInfoRequest) returns (GetCurrentBrowserInfoResponse);
  rpc GetSessionToken (GetSessionTokenRequest) returns (GetSessionTokenResponse);
  rpc NotifyChildrenChanged1 (NotifyChildrenChanged1Request) returns (NotifyChildrenChanged1Response);
  rpc NotifyChildrenChanged2_1 (NotifyChildrenChanged2_1Request) returns (NotifyChildrenChanged2_1Response);
  rpc OnBind (OnBindRequest) returns (OnBindResponse);
  rpc OnCreate (OnCreateRequest) returns (OnCreateResponse);
  rpc OnGetRoot (OnGetRootRequest) returns (OnGetRootResponse);
  rpc SetSessionToken (SetSessionTokenRequest) returns (SetSessionTokenResponse);
}

service BrowserServiceBrowserRootService {
  rpc GetExtras (GetExtrasRequest) returns (GetExtrasResponse);
  rpc GetRootId (GetRootIdRequest) returns (GetRootIdResponse);
}

service BrowserServiceResultService {
  rpc Detach (DetachRequest) returns (DetachResponse);
}

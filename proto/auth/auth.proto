syntax = "proto3";

package auth;

option go_package = "github.com/AndroidGoLab/jni-proxy/proto/auth";

service AuthService {
  // Register a new client by submitting a CSR. Unauthenticated.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Request permission to call specific methods. Requires mTLS.
  rpc RequestPermission(RequestPermissionRequest) returns (RequestPermissionResponse);

  // List methods this client is permitted to call. Requires mTLS.
  rpc ListMyPermissions(ListMyPermissionsRequest) returns (ListMyPermissionsResponse);
}

message RegisterRequest {
  string csr_pem = 1;
}

message RegisterResponse {
  string client_cert_pem = 1;
  string ca_cert_pem = 2;
}

message RequestPermissionRequest {
  repeated string methods = 1;
}

message RequestPermissionResponse {
  string request_id = 1;
  string status = 2;
}

message ListMyPermissionsRequest {}

message ListMyPermissionsResponse {
  repeated string granted_methods = 1;
}

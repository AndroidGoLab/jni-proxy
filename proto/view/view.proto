service ChoreographerService {
  rpc PostFrameCallback (PostFrameCallbackRequest) returns (PostFrameCallbackResponse);
  rpc PostFrameCallbackDelayed (PostFrameCallbackDelayedRequest) returns (PostFrameCallbackDelayedResponse);
  rpc PostVsyncCallback (PostVsyncCallbackRequest) returns (PostVsyncCallbackResponse);
  rpc RemoveFrameCallback (RemoveFrameCallbackRequest) returns (RemoveFrameCallbackResponse);
  rpc RemoveVsyncCallback (RemoveVsyncCallbackRequest) returns (RemoveVsyncCallbackResponse);
  rpc GetInstance (GetInstanceRequest) returns (GetInstanceResponse);
}

service ChoreographerFrameCallbackService {
  rpc DoFrame (DoFrameRequest) returns (DoFrameResponse);
}

service ChoreographerFrameDataService {
  rpc GetFrameTimeNanos (GetFrameTimeNanosRequest) returns (GetFrameTimeNanosResponse);
  rpc GetFrameTimelines (GetFrameTimelinesRequest) returns (GetFrameTimelinesResponse);
  rpc GetPreferredFrameTimeline (GetPreferredFrameTimelineRequest) returns (GetPreferredFrameTimelineResponse);
}

service ChoreographerFrameTimelineService {
  rpc GetDeadlineNanos (GetDeadlineNanosRequest) returns (GetDeadlineNanosResponse);
  rpc GetExpectedPresentationTimeNanos (GetExpectedPresentationTimeNanosRequest) returns (GetExpectedPresentationTimeNanosResponse);
  rpc GetVsyncId (GetVsyncIdRequest) returns (GetVsyncIdResponse);
}

service ChoreographerVsyncCallbackService {
  rpc OnVsync (OnVsyncRequest) returns (OnVsyncResponse);
}

service TreeObserverService {
  rpc AddOnDrawListener (AddOnDrawListenerRequest) returns (AddOnDrawListenerResponse);
  rpc AddOnGlobalFocusChangeListener (AddOnGlobalFocusChangeListenerRequest) returns (AddOnGlobalFocusChangeListenerResponse);
  rpc AddOnGlobalLayoutListener (AddOnGlobalLayoutListenerRequest) returns (AddOnGlobalLayoutListenerResponse);
  rpc AddOnPreDrawListener (AddOnPreDrawListenerRequest) returns (AddOnPreDrawListenerResponse);
  rpc AddOnScrollChangedListener (AddOnScrollChangedListenerRequest) returns (AddOnScrollChangedListenerResponse);
  rpc AddOnTouchModeChangeListener (AddOnTouchModeChangeListenerRequest) returns (AddOnTouchModeChangeListenerResponse);
  rpc AddOnWindowAttachListener (AddOnWindowAttachListenerRequest) returns (AddOnWindowAttachListenerResponse);
  rpc AddOnWindowFocusChangeListener (AddOnWindowFocusChangeListenerRequest) returns (AddOnWindowFocusChangeListenerResponse);
  rpc AddOnWindowVisibilityChangeListener (AddOnWindowVisibilityChangeListenerRequest) returns (AddOnWindowVisibilityChangeListenerResponse);
  rpc DispatchOnDraw (DispatchOnDrawRequest) returns (DispatchOnDrawResponse);
  rpc DispatchOnGlobalLayout (DispatchOnGlobalLayoutRequest) returns (DispatchOnGlobalLayoutResponse);
  rpc DispatchOnPreDraw (DispatchOnPreDrawRequest) returns (DispatchOnPreDrawResponse);
  rpc IsAlive (IsAliveRequest) returns (IsAliveResponse);
  rpc RegisterFrameCommitCallback (RegisterFrameCommitCallbackRequest) returns (RegisterFrameCommitCallbackResponse);
  rpc RemoveGlobalOnLayoutListener (RemoveGlobalOnLayoutListenerRequest) returns (RemoveGlobalOnLayoutListenerResponse);
  rpc RemoveOnDrawListener (RemoveOnDrawListenerRequest) returns (RemoveOnDrawListenerResponse);
  rpc RemoveOnGlobalFocusChangeListener (RemoveOnGlobalFocusChangeListenerRequest) returns (RemoveOnGlobalFocusChangeListenerResponse);
  rpc RemoveOnGlobalLayoutListener (RemoveOnGlobalLayoutListenerRequest) returns (RemoveOnGlobalLayoutListenerResponse);
  rpc RemoveOnPreDrawListener (RemoveOnPreDrawListenerRequest) returns (RemoveOnPreDrawListenerResponse);
  rpc RemoveOnScrollChangedListener (RemoveOnScrollChangedListenerRequest) returns (RemoveOnScrollChangedListenerResponse);

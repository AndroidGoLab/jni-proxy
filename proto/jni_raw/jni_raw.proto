syntax = "proto3";
package jni_raw;
option go_package = "github.com/AndroidGoLab/jni-proxy/proto/jni_raw";

// JType identifies a JNI primitive type for typed dispatch.
enum JType {
  VOID    = 0;
  BOOLEAN = 1;
  BYTE    = 2;
  CHAR    = 3;
  SHORT   = 4;
  INT     = 5;
  LONG    = 6;
  FLOAT   = 7;
  DOUBLE  = 8;
  OBJECT  = 9;
}

// JValue carries a single JNI value (primitive or object handle).
message JValue {
  oneof value {
    bool   z = 1;  // boolean
    int32  b = 2;  // byte
    uint32 c = 3;  // char
    int32  s = 4;  // short
    int32  i = 5;  // int
    int64  j = 6;  // long
    float  f = 7;  // float
    double d = 8;  // double
    int64  l = 9;  // object handle
  }
}

// ---------------------------------------------------------------------------
// JNI Service — raw access to the JNI Env surface.
// ---------------------------------------------------------------------------
service JNIService {
  // Version
  rpc GetVersion (GetVersionRequest) returns (GetVersionResponse);

  // Class operations
  rpc FindClass         (FindClassRequest)         returns (FindClassResponse);
  rpc GetSuperclass     (GetSuperclassRequest)     returns (GetSuperclassResponse);
  rpc IsAssignableFrom  (IsAssignableFromRequest)  returns (IsAssignableFromResponse);

  // Object operations
  rpc AllocObject       (AllocObjectRequest)       returns (AllocObjectResponse);
  rpc NewObject         (NewObjectRequest)         returns (NewObjectResponse);
  rpc GetObjectClass    (GetObjectClassRequest)    returns (GetObjectClassResponse);
  rpc IsInstanceOf      (IsInstanceOfRequest)      returns (IsInstanceOfResponse);
  rpc IsSameObject      (IsSameObjectRequest)      returns (IsSameObjectResponse);
  rpc GetObjectRefType  (GetObjectRefTypeRequest)  returns (GetObjectRefTypeResponse);

  // Method / field ID lookup
  rpc GetMethodID       (GetMethodIDRequest)       returns (GetMethodIDResponse);
  rpc GetStaticMethodID (GetStaticMethodIDRequest) returns (GetStaticMethodIDResponse);
  rpc GetFieldID        (GetFieldIDRequest)        returns (GetFieldIDResponse);
  rpc GetStaticFieldID  (GetStaticFieldIDRequest)  returns (GetStaticFieldIDResponse);

  // Method calls (unified — return type selects the JNI function)
  rpc CallMethod            (CallMethodRequest)            returns (CallMethodResponse);
  rpc CallStaticMethod      (CallStaticMethodRequest)      returns (CallStaticMethodResponse);
  rpc CallNonvirtualMethod  (CallNonvirtualMethodRequest)  returns (CallNonvirtualMethodResponse);

  // Field access (unified — field type selects the JNI function)
  rpc GetField        (GetFieldValueRequest)        returns (GetFieldValueResponse);
  rpc SetField        (SetFieldValueRequest)        returns (SetFieldValueResponse);
  rpc GetStaticField  (GetStaticFieldValueRequest)  returns (GetStaticFieldValueResponse);
  rpc SetStaticField  (SetStaticFieldValueRequest)  returns (SetStaticFieldValueResponse);

  // String operations
  rpc NewStringUTF      (NewStringUTFRequest)      returns (NewStringUTFResponse);
  rpc GetStringUTFChars (GetStringUTFCharsRequest) returns (GetStringUTFCharsResponse);
  rpc GetStringLength   (GetStringLengthRequest)   returns (GetStringLengthResponse);

  // Array operations
  rpc NewPrimitiveArray      (NewPrimitiveArrayRequest)      returns (NewPrimitiveArrayResponse);
  rpc NewObjectArray         (NewObjectArrayRequest)         returns (NewObjectArrayResponse);
  rpc GetArrayLength         (GetArrayLengthRequest)         returns (GetArrayLengthResponse);
  rpc GetObjectArrayElement  (GetObjectArrayElementRequest)  returns (GetObjectArrayElementResponse);
  rpc SetObjectArrayElement  (SetObjectArrayElementRequest)  returns (SetObjectArrayElementResponse);
  rpc GetArrayRegion         (GetArrayRegionRequest)         returns (GetArrayRegionResponse);
  rpc SetArrayRegion         (SetArrayRegionRequest)         returns (SetArrayRegionResponse);

  // Bulk byte array transfer (efficient alternative to GetArrayRegion for byte[]).
  rpc GetByteArrayData       (GetByteArrayDataRequest)       returns (GetByteArrayDataResponse);

  // Reference management
  rpc NewGlobalRef       (NewGlobalRefRequest)       returns (NewGlobalRefResponse);
  rpc DeleteGlobalRef    (DeleteGlobalRefRequest)    returns (DeleteGlobalRefResponse);
  rpc NewLocalRef        (NewLocalRefRequest)        returns (NewLocalRefResponse);
  rpc DeleteLocalRef     (DeleteLocalRefRequest)     returns (DeleteLocalRefResponse);
  rpc NewWeakGlobalRef   (NewWeakGlobalRefRequest)   returns (NewWeakGlobalRefResponse);
  rpc DeleteWeakGlobalRef(DeleteWeakGlobalRefRequest)returns (DeleteWeakGlobalRefResponse);

  // Exception handling
  rpc ExceptionCheck    (ExceptionCheckRequest)    returns (ExceptionCheckResponse);
  rpc ExceptionClear    (ExceptionClearRequest)    returns (ExceptionClearResponse);
  rpc ExceptionDescribe (ExceptionDescribeRequest) returns (ExceptionDescribeResponse);
  rpc ExceptionOccurred (ExceptionOccurredRequest) returns (ExceptionOccurredResponse);
  rpc Throw             (ThrowRequest)             returns (ThrowResponse);
  rpc ThrowNew          (ThrowNewRequest)          returns (ThrowNewResponse);

  // Monitor (synchronization)
  rpc MonitorEnter (MonitorEnterRequest) returns (MonitorEnterResponse);
  rpc MonitorExit  (MonitorExitRequest)  returns (MonitorExitResponse);

  // Local frame management
  rpc PushLocalFrame       (PushLocalFrameRequest)       returns (PushLocalFrameResponse);
  rpc PopLocalFrame        (PopLocalFrameRequest)        returns (PopLocalFrameResponse);
  rpc EnsureLocalCapacity  (EnsureLocalCapacityRequest)  returns (EnsureLocalCapacityResponse);

  // Reflection
  rpc FromReflectedMethod (FromReflectedMethodRequest) returns (FromReflectedMethodResponse);
  rpc FromReflectedField  (FromReflectedFieldRequest)  returns (FromReflectedFieldResponse);
  rpc ToReflectedMethod   (ToReflectedMethodRequest)   returns (ToReflectedMethodResponse);
  rpc ToReflectedField    (ToReflectedFieldRequest)    returns (ToReflectedFieldResponse);

  // Returns the handle to the Android application Context.
  rpc GetAppContext(GetAppContextRequest) returns (GetAppContextResponse);

  // Bidirectional stream for creating Java interface proxies with remote callbacks.
  rpc Proxy(stream ProxyClientMessage) returns (stream ProxyServerMessage);

}

// ---- Version ----
message GetVersionRequest {}
message GetVersionResponse { int32 version = 1; }

// ---- Class ----
message FindClassRequest { string name = 1; }
message FindClassResponse { int64 class_handle = 1; }

message GetSuperclassRequest { int64 class_handle = 1; }
message GetSuperclassResponse { int64 class_handle = 1; }

message IsAssignableFromRequest { int64 class1 = 1; int64 class2 = 2; }
message IsAssignableFromResponse { bool result = 1; }

// ---- Object ----
message AllocObjectRequest { int64 class_handle = 1; }
message AllocObjectResponse { int64 object_handle = 1; }

message NewObjectRequest {
  int64 class_handle = 1;
  int64 method_id    = 2;
  repeated JValue args = 3;
}
message NewObjectResponse { int64 object_handle = 1; }

message GetObjectClassRequest { int64 object_handle = 1; }
message GetObjectClassResponse { int64 class_handle = 1; }

message IsInstanceOfRequest { int64 object_handle = 1; int64 class_handle = 2; }
message IsInstanceOfResponse { bool result = 1; }

message IsSameObjectRequest { int64 object1 = 1; int64 object2 = 2; }
message IsSameObjectResponse { bool result = 1; }

message GetObjectRefTypeRequest { int64 object_handle = 1; }
message GetObjectRefTypeResponse { int32 ref_type = 1; }

// ---- Method/Field ID lookup ----
message GetMethodIDRequest { int64 class_handle = 1; string name = 2; string sig = 3; }
message GetMethodIDResponse { int64 method_id = 1; }

message GetStaticMethodIDRequest { int64 class_handle = 1; string name = 2; string sig = 3; }
message GetStaticMethodIDResponse { int64 method_id = 1; }

message GetFieldIDRequest { int64 class_handle = 1; string name = 2; string sig = 3; }
message GetFieldIDResponse { int64 field_id = 1; }

message GetStaticFieldIDRequest { int64 class_handle = 1; string name = 2; string sig = 3; }
message GetStaticFieldIDResponse { int64 field_id = 1; }

// ---- Method calls ----
message CallMethodRequest {
  int64 object_handle = 1;
  int64 method_id     = 2;
  JType return_type   = 3;
  repeated JValue args = 4;
}
message CallMethodResponse { JValue result = 1; }

message CallStaticMethodRequest {
  int64 class_handle = 1;
  int64 method_id    = 2;
  JType return_type  = 3;
  repeated JValue args = 4;
}
message CallStaticMethodResponse { JValue result = 1; }

message CallNonvirtualMethodRequest {
  int64 object_handle = 1;
  int64 class_handle  = 2;
  int64 method_id     = 3;
  JType return_type   = 4;
  repeated JValue args = 5;
}
message CallNonvirtualMethodResponse { JValue result = 1; }

// ---- Field access ----
message GetFieldValueRequest {
  int64 object_handle = 1;
  int64 field_id      = 2;
  JType field_type    = 3;
}
message GetFieldValueResponse { JValue result = 1; }

message SetFieldValueRequest {
  int64 object_handle = 1;
  int64 field_id      = 2;
  JValue value        = 3;
}
message SetFieldValueResponse {}

message GetStaticFieldValueRequest {
  int64 class_handle = 1;
  int64 field_id     = 2;
  JType field_type   = 3;
}
message GetStaticFieldValueResponse { JValue result = 1; }

message SetStaticFieldValueRequest {
  int64 class_handle = 1;
  int64 field_id     = 2;
  JValue value       = 3;
}
message SetStaticFieldValueResponse {}

// ---- String ----
message NewStringUTFRequest { string value = 1; }
message NewStringUTFResponse { int64 string_handle = 1; }

message GetStringUTFCharsRequest { int64 string_handle = 1; }
message GetStringUTFCharsResponse { string value = 1; }

message GetStringLengthRequest { int64 string_handle = 1; }
message GetStringLengthResponse { int32 length = 1; }

// ---- Array ----
message NewPrimitiveArrayRequest { JType element_type = 1; int32 length = 2; }
message NewPrimitiveArrayResponse { int64 array_handle = 1; }

message NewObjectArrayRequest { int32 length = 1; int64 class_handle = 2; int64 init_element = 3; }
message NewObjectArrayResponse { int64 array_handle = 1; }

message GetArrayLengthRequest { int64 array_handle = 1; }
message GetArrayLengthResponse { int32 length = 1; }

message GetObjectArrayElementRequest { int64 array_handle = 1; int32 index = 2; }
message GetObjectArrayElementResponse { int64 element_handle = 1; }

message SetObjectArrayElementRequest { int64 array_handle = 1; int32 index = 2; int64 element_handle = 3; }
message SetObjectArrayElementResponse {}

message GetArrayRegionRequest {
  int64 array_handle = 1;
  JType element_type = 2;
  int32 start        = 3;
  int32 length       = 4;
}
message GetArrayRegionResponse { repeated JValue elements = 1; }

message SetArrayRegionRequest {
  int64 array_handle    = 1;
  JType element_type    = 2;
  int32 start           = 3;
  repeated JValue elements = 4;
}
message SetArrayRegionResponse {}

// Bulk byte array transfer.
message GetByteArrayDataRequest { int64 array_handle = 1; }
message GetByteArrayDataResponse { bytes data = 1; }

// ---- Reference management ----
message NewGlobalRefRequest { int64 object_handle = 1; }
message NewGlobalRefResponse { int64 ref_handle = 1; }

message DeleteGlobalRefRequest { int64 ref_handle = 1; }
message DeleteGlobalRefResponse {}

message NewLocalRefRequest { int64 object_handle = 1; }
message NewLocalRefResponse { int64 ref_handle = 1; }

message DeleteLocalRefRequest { int64 ref_handle = 1; }
message DeleteLocalRefResponse {}

message NewWeakGlobalRefRequest { int64 object_handle = 1; }
message NewWeakGlobalRefResponse { int64 ref_handle = 1; }

message DeleteWeakGlobalRefRequest { int64 ref_handle = 1; }
message DeleteWeakGlobalRefResponse {}

// ---- Exception handling ----
message ExceptionCheckRequest {}
message ExceptionCheckResponse { bool has_exception = 1; }

message ExceptionClearRequest {}
message ExceptionClearResponse {}

message ExceptionDescribeRequest {}
message ExceptionDescribeResponse {}

message ExceptionOccurredRequest {}
message ExceptionOccurredResponse { int64 throwable_handle = 1; }

message ThrowRequest { int64 throwable_handle = 1; }
message ThrowResponse {}

message ThrowNewRequest { int64 class_handle = 1; string message = 2; }
message ThrowNewResponse {}

// ---- Monitor ----
message MonitorEnterRequest { int64 object_handle = 1; }
message MonitorEnterResponse {}

message MonitorExitRequest { int64 object_handle = 1; }
message MonitorExitResponse {}

// ---- Local frame ----
message PushLocalFrameRequest { int32 capacity = 1; }
message PushLocalFrameResponse {}

message PopLocalFrameRequest { int64 result_handle = 1; }
message PopLocalFrameResponse { int64 result_handle = 1; }

message EnsureLocalCapacityRequest { int32 capacity = 1; }
message EnsureLocalCapacityResponse {}

// ---- Reflection ----
message FromReflectedMethodRequest { int64 method_object = 1; }
message FromReflectedMethodResponse { int64 method_id = 1; }

message FromReflectedFieldRequest { int64 field_object = 1; }
message FromReflectedFieldResponse { int64 field_id = 1; }

message ToReflectedMethodRequest { int64 class_handle = 1; int64 method_id = 2; bool is_static = 3; }
message ToReflectedMethodResponse { int64 method_object = 1; }

message ToReflectedFieldRequest { int64 class_handle = 1; int64 field_id = 2; bool is_static = 3; }
message ToReflectedFieldResponse { int64 field_object = 1; }

// ---- App Context ----
message GetAppContextRequest {}
message GetAppContextResponse { int64 context_handle = 1; }

// ---- Proxy (remote callbacks) ----
message ProxyClientMessage {
  oneof msg {
    CreateProxyRequest create = 1;
    CallbackResponse callback_response = 2;
  }
}

message ProxyServerMessage {
  oneof msg {
    CreateProxyResponse created = 1;
    CallbackEvent callback = 2;
  }
}

message CreateProxyRequest {
  repeated int64 interface_class_handles = 1;
}

message CreateProxyResponse {
  int64 proxy_handle = 1;
}

message CallbackEvent {
  int64 callback_id = 1;
  string method_name = 2;
  repeated int64 arg_handles = 3;
  bool expects_response = 4;
}

message CallbackResponse {
  int64 callback_id = 1;
  int64 result_handle = 2;
  string error = 3;
}

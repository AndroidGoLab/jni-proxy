service LevelListDrawableService {
  rpc NewLevelListDrawable (NewLevelListDrawableRequest) returns (NewLevelListDrawableResponse);
  rpc AddLevel (AddLevelRequest) returns (AddLevelResponse);
  rpc Inflate (InflateRequest) returns (InflateResponse);
  rpc Mutate (MutateRequest) returns (MutateResponse);
}

service LayerDrawableService {
  rpc NewLayerDrawable (NewLayerDrawableRequest) returns (NewLayerDrawableResponse);
  rpc AddLayer (AddLayerRequest) returns (AddLayerResponse);
  rpc ApplyTheme (ApplyThemeRequest) returns (ApplyThemeResponse);
  rpc CanApplyTheme (CanApplyThemeRequest) returns (CanApplyThemeResponse);
  rpc Draw (DrawRequest) returns (DrawResponse);
  rpc FindDrawableByLayerId (FindDrawableByLayerIdRequest) returns (FindDrawableByLayerIdResponse);
  rpc FindIndexByLayerId (FindIndexByLayerIdRequest) returns (FindIndexByLayerIdResponse);
  rpc GetAlpha (GetAlphaRequest) returns (GetAlphaResponse);
  rpc GetBottomPadding (GetBottomPaddingRequest) returns (GetBottomPaddingResponse);
  rpc GetChangingConfigurations (GetChangingConfigurationsRequest) returns (GetChangingConfigurationsResponse);
  rpc GetConstantState (GetConstantStateRequest) returns (GetConstantStateResponse);
  rpc GetDrawable (GetDrawableRequest) returns (GetDrawableResponse);
  rpc GetEndPadding (GetEndPaddingRequest) returns (GetEndPaddingResponse);
  rpc GetHotspotBounds (GetHotspotBoundsRequest) returns (GetHotspotBoundsResponse);
  rpc GetId (GetIdRequest) returns (GetIdResponse);
  rpc GetIntrinsicHeight (GetIntrinsicHeightRequest) returns (GetIntrinsicHeightResponse);
  rpc GetIntrinsicWidth (GetIntrinsicWidthRequest) returns (GetIntrinsicWidthResponse);
  rpc GetLayerGravity (GetLayerGravityRequest) returns (GetLayerGravityResponse);
  rpc GetLayerHeight (GetLayerHeightRequest) returns (GetLayerHeightResponse);
  rpc GetLayerInsetBottom (GetLayerInsetBottomRequest) returns (GetLayerInsetBottomResponse);
  rpc GetLayerInsetEnd (GetLayerInsetEndRequest) returns (GetLayerInsetEndResponse);
  rpc GetLayerInsetLeft (GetLayerInsetLeftRequest) returns (GetLayerInsetLeftResponse);
  rpc GetLayerInsetRight (GetLayerInsetRightRequest) returns (GetLayerInsetRightResponse);
  rpc GetLayerInsetStart (GetLayerInsetStartRequest) returns (GetLayerInsetStartResponse);
  rpc GetLayerInsetTop (GetLayerInsetTopRequest) returns (GetLayerInsetTopResponse);
  rpc GetLayerWidth (GetLayerWidthRequest) returns (GetLayerWidthResponse);
  rpc GetLeftPadding (GetLeftPaddingRequest) returns (GetLeftPaddingResponse);
  rpc GetNumberOfLayers (GetNumberOfLayersRequest) returns (GetNumberOfLayersResponse);
  rpc GetOpacity (GetOpacityRequest) returns (GetOpacityResponse);
  rpc GetOutline (GetOutlineRequest) returns (GetOutlineResponse);
  rpc GetPadding (GetPaddingRequest) returns (GetPaddingResponse);
  rpc GetPaddingMode (GetPaddingModeRequest) returns (GetPaddingModeResponse);
  rpc GetRightPadding (GetRightPaddingRequest) returns (GetRightPaddingResponse);
  rpc GetStartPadding (GetStartPaddingRequest) returns (GetStartPaddingResponse);
  rpc GetTopPadding (GetTopPaddingRequest) returns (GetTopPaddingResponse);
  rpc HasFocusStateSpecified (HasFocusStateSpecifiedRequest) returns (HasFocusStateSpecifiedResponse);
  rpc Inflate (InflateRequest) returns (InflateResponse);

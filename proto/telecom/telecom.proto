service RemoteConferenceService {
  rpc Disconnect (DisconnectRequest) returns (DisconnectResponse);
  rpc GetConferenceableConnections (GetConferenceableConnectionsRequest) returns (GetConferenceableConnectionsResponse);
  rpc GetConnectionCapabilities (GetConnectionCapabilitiesRequest) returns (GetConnectionCapabilitiesResponse);
  rpc GetConnectionProperties (GetConnectionPropertiesRequest) returns (GetConnectionPropertiesResponse);
  rpc GetConnections (GetConnectionsRequest) returns (GetConnectionsResponse);
  rpc GetDisconnectCause (GetDisconnectCauseRequest) returns (GetDisconnectCauseResponse);
  rpc GetExtras (GetExtrasRequest) returns (GetExtrasResponse);
  rpc GetState (GetStateRequest) returns (GetStateResponse);
  rpc Hold (HoldRequest) returns (HoldResponse);
  rpc Merge (MergeRequest) returns (MergeResponse);
  rpc PlayDtmfTone (PlayDtmfToneRequest) returns (PlayDtmfToneResponse);

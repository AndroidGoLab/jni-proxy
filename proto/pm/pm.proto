service ActivityInfoService {
  rpc NewActivityInfo (NewActivityInfoRequest) returns (NewActivityInfoResponse);
  rpc DescribeContents (DescribeContentsRequest) returns (DescribeContentsResponse);
  rpc Dump (DumpRequest) returns (DumpResponse);
  rpc GetKnownActivityEmbeddingCerts (GetKnownActivityEmbeddingCertsRequest) returns (GetKnownActivityEmbeddingCertsResponse);
  rpc GetThemeResource (GetThemeResourceRequest) returns (GetThemeResourceResponse);
  rpc ToString (ToStringRequest) returns (ToStringResponse);
  rpc WriteToParcel (WriteToParcelRequest) returns (WriteToParcelResponse);
}

service ProviderInfoService {
  rpc NewProviderInfo (NewProviderInfoRequest) returns (NewProviderInfoResponse);
  rpc DescribeContents (DescribeContentsRequest) returns (DescribeContentsResponse);
  rpc Dump (DumpRequest) returns (DumpResponse);
  rpc ToString (ToStringRequest) returns (ToStringResponse);
  rpc WriteToParcel (WriteToParcelRequest) returns (WriteToParcelResponse);
}

service SharedLibraryInfoService {
